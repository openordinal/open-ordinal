<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-label="Open Ordinal example OG card v2">
  <rect width="1200" height="627" fill="#f7f6f2"/>

  <!-- Frame -->
  <rect x="36" y="36" width="1128" height="555" fill="none" stroke="#d8d6d0" stroke-width="1"/>

  <!-- Header -->
  <text x="72" y="84" fill="#0f0f0f" font-family="'Geist Mono', 'Courier New', monospace" font-size="12" letter-spacing="3">OPEN ORDINAL</text>
  <line x1="252" y1="78" x2="1128" y2="78" stroke="#d8d6d0" stroke-width="1"/>

  <!-- Category -->
  <rect x="72" y="106" width="168" height="30" fill="none" stroke="#1a3a5c" stroke-width="1"/>
  <text x="86" y="126" fill="#1a3a5c" font-family="'Geist Mono', 'Courier New', monospace" font-size="12" letter-spacing="1.8">ECONOMICS</text>

  <!-- Main title -->
  <text x="72" y="246" fill="#0f0f0f" font-family="'EB Garamond', Georgia, serif" font-size="66" font-weight="500">
    <tspan x="72" dy="0">Sub-Saharan Growth Slows</tspan>
    <tspan x="72" dy="74">as Food Inflation Holds</tspan>
  </text>

  <!-- High-attention key stat block -->
  <line x1="72" y1="370" x2="1128" y2="370" stroke="#d8d6d0" stroke-width="1"/>
  <text x="72" y="430" fill="#999999" font-family="'Geist Mono', 'Courier New', monospace" font-size="12" letter-spacing="0.9">KEY DATAPOINT</text>
  <text x="72" y="466" fill="#999999" font-family="'Geist Mono', 'Courier New', monospace" font-size="12" letter-spacing="0.8">Median food inflation (2025)</text>

  <text x="1116" y="500" text-anchor="end" fill="#1a3a5c" font-family="'EB Garamond', Georgia, serif" font-size="128" font-weight="500">12.4%</text>

  <!-- Footer meta -->
  <line x1="72" y1="536" x2="1128" y2="536" stroke="#d8d6d0" stroke-width="1"/>
  <text x="72" y="562" fill="#999999" font-family="'Geist Mono', 'Courier New', monospace" font-size="11" letter-spacing="1.3">OPENORDINAL.ORG</text>
  <text x="1128" y="562" text-anchor="end" fill="#999999" font-family="'Geist Mono', 'Courier New', monospace" font-size="11" letter-spacing="1.3">ENTRY 038 | 2026-03-03</text>
</svg>
